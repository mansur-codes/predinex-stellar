name: Deploy contract to testnet

on:
  push:
    branches: [ main ]
    paths:
      - 'contracts/**'
      - '.github/workflows/deploy-testnet.yml'
  workflow_dispatch:

# Only deploy from the canonical upstream repo. Forks that pull this
# workflow do not have the secrets configured and would fail noisily.
env:
  CANONICAL_REPO: dimka90/predinex-stellar
  STELLAR_NETWORK: testnet
  STELLAR_RPC_URL: https://soroban-testnet.stellar.org
  STELLAR_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
  # Hardcoded testnet XLM Stellar Asset Contract, see docs/local-runbook.md.
  XLM_TOKEN_TESTNET: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

concurrency:
  group: deploy-testnet
  cancel-in-progress: false

jobs:
  build:
    name: Build optimized WASM
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Soroban WASM target
        run: rustup target add wasm32v1-none

      - name: Cache stellar-cli
        id: stellar-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Install stellar-cli
        if: steps.stellar-cli-cache.outputs.cache-hit != 'true'
        run: cargo install --locked stellar-cli@22.0.1

      - name: Build contract
        working-directory: ./contracts/predinex
        run: stellar contract build

      - name: Optimize WASM
        working-directory: ./contracts/predinex
        run: |
          UNOPTIMIZED=$(find target/wasm32v1-none/release -maxdepth 1 -name '*.wasm' -not -name '*.optimized.wasm' | head -n1)
          if [ -z "$UNOPTIMIZED" ]; then
            echo "::error::no wasm output found under target/wasm32v1-none/release/"
            exit 1
          fi
          echo "Optimizing $UNOPTIMIZED"
          stellar contract optimize --wasm "$UNOPTIMIZED"

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: predinex-wasm
          path: contracts/predinex/target/wasm32v1-none/release/*.optimized.wasm
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to testnet
    needs: build
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}
      deploy_tx: ${{ steps.deploy.outputs.deploy_tx }}
      init_tx: ${{ steps.deploy.outputs.init_tx }}
      treasury: ${{ steps.deploy.outputs.treasury }}
    steps:
      - uses: actions/checkout@v4

      - name: Download optimized WASM
        uses: actions/download-artifact@v4
        with:
          name: predinex-wasm
          path: ./wasm

      - name: Cache stellar-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Setup Rust (for stellar-cli reuse)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install stellar-cli if cache miss
        run: |
          if ! command -v stellar >/dev/null 2>&1; then
            cargo install --locked stellar-cli@22.0.1
          fi

      - name: Configure testnet network
        run: |
          stellar network add testnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE" || true

      - name: Register deployer key
        env:
          STELLAR_TESTNET_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: |
          if [ -z "$STELLAR_TESTNET_SECRET_KEY" ]; then
            echo "::error::STELLAR_TESTNET_SECRET_KEY is not configured for this repo. See .github/workflows/deploy-testnet.yml for setup."
            exit 1
          fi
          stellar keys add deployer \
            --secret-key "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet
          TREASURY=$(stellar keys address deployer)
          echo "treasury=$TREASURY" >> "$GITHUB_OUTPUT"
        id: deployer

      - name: Deploy contract and initialize
        id: deploy
        run: |
          set -euo pipefail
          WASM_PATH=$(find ./wasm -maxdepth 1 -name '*.optimized.wasm' | head -n1)
          if [ -z "$WASM_PATH" ]; then
            echo "::error::no optimized wasm found in artifact"
            exit 1
          fi
          echo "Deploying $WASM_PATH"

          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM_PATH" \
            --network testnet \
            --source deployer)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract: $CONTRACT_ID"

          DEPLOY_TX=$(stellar contract deploy \
            --wasm "$WASM_PATH" \
            --network testnet \
            --source deployer \
            --print-tx-hash 2>/dev/null || echo "")
          echo "deploy_tx=${DEPLOY_TX}" >> "$GITHUB_OUTPUT"

          TREASURY="${{ steps.deployer.outputs.treasury }}"
          echo "treasury=$TREASURY" >> "$GITHUB_OUTPUT"

          INIT_TX=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- initialize \
            --token "$XLM_TOKEN_TESTNET" \
            --treasury_recipient "$TREASURY" \
            --admin "$TREASURY")
          echo "init_tx=$INIT_TX" >> "$GITHUB_OUTPUT"
          echo "Initialized contract."

      - name: Write deployment manifest
        run: |
          mkdir -p deployment
          cat > deployment/deployment.json <<EOF
          {
            "network": "testnet",
            "contract_id": "${{ steps.deploy.outputs.contract_id }}",
            "deploy_tx": "${{ steps.deploy.outputs.deploy_tx }}",
            "init_tx": "${{ steps.deploy.outputs.init_tx }}",
            "treasury": "${{ steps.deploy.outputs.treasury }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat deployment/deployment.json

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment/deployment.json
          retention-days: 90

  smoke:
    name: Smoke test
    needs: deploy
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.run.outputs.passed }}
      create_tx: ${{ steps.run.outputs.create_tx }}
      pool_count_before: ${{ steps.run.outputs.before }}
      pool_count_after: ${{ steps.run.outputs.after }}
      pool_id: ${{ steps.run.outputs.pool_id }}
      bet_placed: ${{ steps.run.outputs.bet }}
      settled: ${{ steps.run.outputs.settle }}
      claim_amount: ${{ steps.run.outputs.claim }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache stellar-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install stellar-cli if cache miss
        run: |
          if ! command -v stellar >/dev/null 2>&1; then
            cargo install --locked stellar-cli@22.0.1
          fi

      - name: Configure testnet network
        run: |
          stellar network add testnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE" || true

      - name: Register deployer key
        env:
          STELLAR_TESTNET_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: |
          stellar keys add deployer \
            --secret-key "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet

      - name: Create and fund smoke bettor account
        run: |
          # Exercising place_bet -> settle -> claim needs a second account that
          # is distinct from the deployer. On testnet we generate one and fund
          # it for free via friendbot.
          stellar keys generate bettor --network testnet --fund
          echo "Bettor address: $(stellar keys address bettor)"

      - name: Run smoke checks
        id: run
        env:
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          TREASURY: ${{ needs.deploy.outputs.treasury }}
        run: |
          set -euo pipefail
          BETTOR=$(stellar keys address bettor)
          echo "Bettor address: $BETTOR"

          BEFORE=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- get_pool_count)
          echo "Pool count before: $BEFORE"
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          # Use the minimum allowed pool duration (300s) so the pool can expire
          # within the job after a short synthetic wait. create_pool returns the
          # new pool id on stdout.
          POOL_ID=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- create_pool \
            --creator "$TREASURY" \
            --title "Smoke test: $(date -u +%Y%m%d-%H%M%S)" \
            --description "Automated smoke deployment from commit ${{ github.sha }}" \
            --outcome_a "Yes" \
            --outcome_b "No" \
            --duration 300 \
            --amount 10000000)
          POOL_ID=$(echo "$POOL_ID" | tr -d '"')
          echo "Created pool id: $POOL_ID"
          echo "pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "create_tx=$POOL_ID" >> "$GITHUB_OUTPUT"

          AFTER=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- get_pool_count)
          echo "Pool count after: $AFTER"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

          if [ "$AFTER" = "$BEFORE" ]; then
            echo "::error::create_pool did not increment pool count (before=$BEFORE, after=$AFTER)"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # place_bet — the bettor stakes on outcome 0. Must happen before the
          # pool expires. The optional referrer argument is omitted (defaults to
          # None). The bettor signs as --source so user.require_auth() passes.
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source bettor \
            -- place_bet \
            --user "$BETTOR" \
            --pool_id "$POOL_ID" \
            --outcome 0 \
            --amount 2000000
          echo "Placed bet of 2000000 stroops on outcome 0"
          echo "bet=true" >> "$GITHUB_OUTPUT"

          # Wait for the pool to expire (minimum duration is 300s) so it can be
          # settled. This is the synthetic wait the smoke test previously skipped.
          echo "Waiting 330s for pool $POOL_ID to expire before settling..."
          sleep 330

          # settle_pool — only the admin (the deployer) may settle. Outcome 0
          # wins, so the bettor becomes the sole winner.
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- settle_pool \
            --caller "$TREASURY" \
            --pool_id "$POOL_ID" \
            --winning_outcome 0
          echo "Settled pool $POOL_ID with winning outcome 0"
          echo "settle=true" >> "$GITHUB_OUTPUT"

          # claim_winnings — the winning bettor claims their payout. The return
          # value is the payout in stroops and must be positive.
          CLAIM=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source bettor \
            -- claim_winnings \
            --user "$BETTOR" \
            --pool_id "$POOL_ID")
          CLAIM=$(echo "$CLAIM" | tr -d '"')
          echo "Claimed winnings: $CLAIM stroops"
          echo "claim=$CLAIM" >> "$GITHUB_OUTPUT"
          if [ -z "$CLAIM" ] || [ "$CLAIM" -le 0 ]; then
            echo "::error::claim_winnings returned a non-positive payout ($CLAIM)"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "passed=true" >> "$GITHUB_OUTPUT"

  report:
    name: Report
    needs: [deploy, smoke]
    if: always() && github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Locate associated PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha,
            });
            const merged = res.data.find((pr) => pr.merged_at);
            const target = merged ?? res.data[0];
            if (target) {
              core.setOutput('number', String(target.number));
              core.setOutput('url', target.html_url);
            } else {
              core.setOutput('number', '');
              core.setOutput('url', '');
            }

      - name: Compose deployment summary
        id: summary
        env:
          DEPLOY_OUTCOME: ${{ needs.deploy.result }}
          SMOKE_OUTCOME: ${{ needs.smoke.result }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          DEPLOY_TX: ${{ needs.deploy.outputs.deploy_tx }}
          INIT_TX: ${{ needs.deploy.outputs.init_tx }}
          CREATE_TX: ${{ needs.smoke.outputs.create_tx }}
          BEFORE: ${{ needs.smoke.outputs.pool_count_before }}
          AFTER: ${{ needs.smoke.outputs.pool_count_after }}
          POOL_ID: ${{ needs.smoke.outputs.pool_id }}
          BET_PLACED: ${{ needs.smoke.outputs.bet_placed }}
          SETTLED: ${{ needs.smoke.outputs.settled }}
          CLAIM_AMOUNT: ${{ needs.smoke.outputs.claim_amount }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$SMOKE_OUTCOME" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Success"
          elif [ "$DEPLOY_OUTCOME" = "success" ]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="Deployed, smoke failed"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Failed"
          fi
          echo "status_icon=$STATUS_ICON" >> "$GITHUB_OUTPUT"
          echo "status_text=$STATUS_TEXT" >> "$GITHUB_OUTPUT"

          {
            echo "$STATUS_ICON **Testnet deploy: $STATUS_TEXT** — commit \`${COMMIT:0:7}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Network | testnet |"
            echo "| Contract ID | \`${CONTRACT_ID:-—}\` |"
            echo "| Deploy tx | \`${DEPLOY_TX:-—}\` |"
            echo "| Initialize tx | \`${INIT_TX:-—}\` |"
            echo "| Smoke pool id | \`${POOL_ID:-${CREATE_TX:-—}}\` |"
            echo "| Pool count (before → after) | \`${BEFORE:-—} → ${AFTER:-—}\` |"
            echo "| place_bet | \`${BET_PLACED:-—}\` |"
            echo "| settle_pool | \`${SETTLED:-—}\` |"
            echo "| claim_winnings (stroops) | \`${CLAIM_AMOUNT:-—}\` |"
            echo "| Workflow run | [${{ github.run_id }}]($RUN_URL) |"
            echo ""
            if [ "$SMOKE_OUTCOME" != "success" ]; then
              echo "> **Rollback:** the previous good contract ID can be retrieved from prior PR comments or the \`deployment-manifest\` artifact of a previous run. See \`docs/deployments/rollback.md\` for steps."
            fi
          } > summary.md

          {
            echo "## Testnet deploy summary"
            echo ""
            cat summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on associated PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS_TEXT: ${{ steps.summary.outputs.status_text }}
          STATUS_ICON: ${{ steps.summary.outputs.status_icon }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n --arg text "$STATUS_ICON Testnet deploy: $STATUS_TEXT — contract \`${CONTRACT_ID:-—}\` (<$RUN_URL|run>)" '{text: $text}')" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS_TEXT: ${{ steps.summary.outputs.status_text }}
          STATUS_ICON: ${{ steps.summary.outputs.status_icon }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n --arg content "$STATUS_ICON Testnet deploy: $STATUS_TEXT — contract \`${CONTRACT_ID:-—}\` ($RUN_URL)" '{content: $content}')" \
            "$DISCORD_WEBHOOK_URL"
