name: Deploy contract to mainnet

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: 'Git tag to deploy (e.g. v1.2.0)'
        required: true
        type: string
      confirm:
        description: 'Type DEPLOY to confirm mainnet deployment'
        required: true
        type: string
      run_lifecycle_smoke:
        description: 'Run the full place_bet -> settle -> claim smoke cycle (uses real XLM, a pre-funded bettor, and a ~5min wait)'
        required: false
        default: false
        type: boolean

# Only deploy from the canonical upstream repo. Forks that pull this
# workflow do not have the secrets configured and would fail noisily.
env:
  CANONICAL_REPO: dimka90/predinex-stellar
  STELLAR_NETWORK: mainnet
  STELLAR_RPC_URL: https://horizon.stellar.org
  STELLAR_NETWORK_PASSPHRASE: 'Public Global Stellar Network ; September 2015'
  # Mainnet XLM Stellar Asset Contract
  XLM_TOKEN_MAINNET: CAS3J7GYLGXMF6TDJBBYYSE3HQ6BBSMLNUQ34T6TZMYMW2FC6NJT8BMI

concurrency:
  group: deploy-mainnet
  cancel-in-progress: false

jobs:
  guard:
    name: Validate inputs
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check confirmation string
        # INPUT_CONFIRM is safe: workflow_dispatch inputs are caller-controlled but
        # we only compare the value; no shell word-splitting risk when read via env var.
        env:
          INPUT_CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$INPUT_CONFIRM" != "DEPLOY" ]; then
            echo "::error::Confirmation string must be exactly DEPLOY"
            exit 1
          fi
          echo "Confirmation string is valid."

      - name: Check git tag format
        env:
          INPUT_GIT_TAG: ${{ github.event.inputs.git_tag }}
        run: |
          if [[ "$INPUT_GIT_TAG" != v* ]]; then
            echo "::error::git_tag must start with 'v' (got: $INPUT_GIT_TAG)"
            exit 1
          fi
          echo "Git tag format is valid: $INPUT_GIT_TAG"

  build:
    name: Build optimized WASM
    needs: guard
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    environment: mainnet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_tag }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Soroban WASM target
        run: rustup target add wasm32v1-none

      - name: Cache stellar-cli
        id: stellar-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Install stellar-cli
        if: steps.stellar-cli-cache.outputs.cache-hit != 'true'
        run: cargo install --locked stellar-cli@22.0.1

      - name: Build contract
        working-directory: ./contracts/predinex
        run: stellar contract build

      - name: Optimize WASM
        working-directory: ./contracts/predinex
        run: |
          UNOPTIMIZED=$(find target/wasm32v1-none/release -maxdepth 1 -name '*.wasm' -not -name '*.optimized.wasm' | head -n1)
          if [ -z "$UNOPTIMIZED" ]; then
            echo "::error::no wasm output found under target/wasm32v1-none/release/"
            exit 1
          fi
          echo "Optimizing $UNOPTIMIZED"
          stellar contract optimize --wasm "$UNOPTIMIZED"

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: predinex-wasm
          path: contracts/predinex/target/wasm32v1-none/release/*.optimized.wasm
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to mainnet
    needs: build
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}
      deploy_tx: ${{ steps.deploy.outputs.deploy_tx }}
      init_tx: ${{ steps.deploy.outputs.init_tx }}
      treasury: ${{ steps.deployer.outputs.treasury }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_tag }}

      - name: Download optimized WASM
        uses: actions/download-artifact@v4
        with:
          name: predinex-wasm
          path: ./wasm

      - name: Cache stellar-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Setup Rust (for stellar-cli reuse)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install stellar-cli if cache miss
        run: |
          if ! command -v stellar >/dev/null 2>&1; then
            cargo install --locked stellar-cli@22.0.1
          fi

      - name: Configure mainnet network
        run: |
          stellar network add mainnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE" || true

      - name: Register deployer key
        id: deployer
        env:
          STELLAR_MAINNET_SECRET_KEY: ${{ secrets.STELLAR_MAINNET_SECRET_KEY }}
        run: |
          if [ -z "$STELLAR_MAINNET_SECRET_KEY" ]; then
            echo "::error::STELLAR_MAINNET_SECRET_KEY is not configured for this repo. See .github/workflows/deploy-mainnet.yml for setup."
            exit 1
          fi
          stellar keys add deployer \
            --secret-key "$STELLAR_MAINNET_SECRET_KEY" \
            --network mainnet
          TREASURY=$(stellar keys address deployer)
          echo "treasury=$TREASURY" >> "$GITHUB_OUTPUT"

      - name: Deploy contract and initialize
        id: deploy
        run: |
          set -euo pipefail
          WASM_PATH=$(find ./wasm -maxdepth 1 -name '*.optimized.wasm' | head -n1)
          if [ -z "$WASM_PATH" ]; then
            echo "::error::no optimized wasm found in artifact"
            exit 1
          fi
          echo "Deploying $WASM_PATH"

          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM_PATH" \
            --network mainnet \
            --source deployer)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract: $CONTRACT_ID"

          DEPLOY_TX=$(stellar contract deploy \
            --wasm "$WASM_PATH" \
            --network mainnet \
            --source deployer \
            --print-tx-hash 2>/dev/null || echo "")
          echo "deploy_tx=${DEPLOY_TX}" >> "$GITHUB_OUTPUT"

          TREASURY=$(stellar keys address deployer)
          echo "treasury=$TREASURY" >> "$GITHUB_OUTPUT"

          INIT_TX=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source deployer \
            -- initialize \
            --token "$XLM_TOKEN_MAINNET" \
            --treasury_recipient "$TREASURY" \
            --admin "$TREASURY")
          echo "init_tx=$INIT_TX" >> "$GITHUB_OUTPUT"
          echo "Initialized contract."

      - name: Write deployment manifest
        env:
          INPUT_GIT_TAG: ${{ github.event.inputs.git_tag }}
          DEPLOY_CONTRACT_ID: ${{ steps.deploy.outputs.contract_id }}
          DEPLOY_TX: ${{ steps.deploy.outputs.deploy_tx }}
          DEPLOY_INIT_TX: ${{ steps.deploy.outputs.init_tx }}
          DEPLOY_TREASURY: ${{ steps.deployer.outputs.treasury }}
          DEPLOY_COMMIT: ${{ github.sha }}
          DEPLOY_REF: ${{ github.ref }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_SERVER_URL: ${{ github.server_url }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p deployment
          # Use jq to safely construct JSON — no raw interpolation into the heredoc
          jq -n \
            --arg network "mainnet" \
            --arg git_tag "$INPUT_GIT_TAG" \
            --arg contract_id "$DEPLOY_CONTRACT_ID" \
            --arg deploy_tx "$DEPLOY_TX" \
            --arg init_tx "$DEPLOY_INIT_TX" \
            --arg treasury "$DEPLOY_TREASURY" \
            --arg commit "$DEPLOY_COMMIT" \
            --arg ref "$DEPLOY_REF" \
            --arg timestamp_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url "$DEPLOY_SERVER_URL/$DEPLOY_REPOSITORY/actions/runs/$DEPLOY_RUN_ID" \
            '{network: $network, git_tag: $git_tag, contract_id: $contract_id,
              deploy_tx: $deploy_tx, init_tx: $init_tx, treasury: $treasury,
              commit: $commit, ref: $ref, timestamp_utc: $timestamp_utc,
              run_url: $run_url}' \
            > deployment/deployment.json
          cat deployment/deployment.json

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment/deployment.json
          retention-days: 365

  smoke:
    name: Smoke test
    needs: deploy
    if: github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.run.outputs.passed }}
      create_tx: ${{ steps.run.outputs.create_tx }}
      pool_count_before: ${{ steps.run.outputs.before }}
      pool_count_after: ${{ steps.run.outputs.after }}
      pool_id: ${{ steps.run.outputs.pool_id }}
      bet_placed: ${{ steps.run.outputs.bet }}
      settled: ${{ steps.run.outputs.settle }}
      claim_amount: ${{ steps.run.outputs.claim }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache stellar-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v22-${{ runner.os }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install stellar-cli if cache miss
        run: |
          if ! command -v stellar >/dev/null 2>&1; then
            cargo install --locked stellar-cli@22.0.1
          fi

      - name: Configure mainnet network
        run: |
          stellar network add mainnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE" || true

      - name: Register deployer key
        env:
          STELLAR_MAINNET_SECRET_KEY: ${{ secrets.STELLAR_MAINNET_SECRET_KEY }}
        run: |
          stellar keys add deployer \
            --secret-key "$STELLAR_MAINNET_SECRET_KEY" \
            --network mainnet

      # The full betting lifecycle on mainnet spends real XLM and needs a second
      # funded account (there is no friendbot on mainnet). It is therefore opt-in
      # via the `run_lifecycle_smoke` input and uses a pre-funded bettor key
      # supplied through the STELLAR_MAINNET_BETTOR_SECRET_KEY secret.
      - name: Register bettor key (optional lifecycle smoke)
        if: github.event.inputs.run_lifecycle_smoke == 'true'
        env:
          STELLAR_MAINNET_BETTOR_SECRET_KEY: ${{ secrets.STELLAR_MAINNET_BETTOR_SECRET_KEY }}
        run: |
          if [ -z "$STELLAR_MAINNET_BETTOR_SECRET_KEY" ]; then
            echo "::error::run_lifecycle_smoke=true but STELLAR_MAINNET_BETTOR_SECRET_KEY is not configured. Add a pre-funded bettor key or run with the lifecycle smoke disabled."
            exit 1
          fi
          stellar keys add bettor \
            --secret-key "$STELLAR_MAINNET_BETTOR_SECRET_KEY" \
            --network mainnet
          echo "Bettor address: $(stellar keys address bettor)"

      - name: Run smoke checks
        id: run
        env:
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          TREASURY: ${{ needs.deploy.outputs.treasury }}
          INPUT_GIT_TAG: ${{ github.event.inputs.git_tag }}
          SMOKE_COMMIT: ${{ github.sha }}
          RUN_LIFECYCLE: ${{ github.event.inputs.run_lifecycle_smoke }}
        run: |
          set -euo pipefail
          BEFORE=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source deployer \
            -- get_pool_count)
          echo "Pool count before: $BEFORE"
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          # Minimum allowed pool duration (300s) so the optional lifecycle smoke
          # can settle within the job. create_pool returns the new pool id.
          POOL_ID=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source deployer \
            -- create_pool \
            --creator "$TREASURY" \
            --title "Mainnet smoke: $(date -u +%Y%m%d-%H%M%S)" \
            --description "Automated mainnet smoke test from tag $INPUT_GIT_TAG commit $SMOKE_COMMIT" \
            --outcome_a "Yes" \
            --outcome_b "No" \
            --duration 300 \
            --amount 10000000)
          POOL_ID=$(echo "$POOL_ID" | tr -d '"')
          echo "Created pool id: $POOL_ID"
          echo "pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "create_tx=$POOL_ID" >> "$GITHUB_OUTPUT"

          AFTER=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source deployer \
            -- get_pool_count)
          echo "Pool count after: $AFTER"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

          if [ "$AFTER" = "$BEFORE" ]; then
            echo "::error::create_pool did not increment pool count (before=$BEFORE, after=$AFTER)"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$RUN_LIFECYCLE" != "true" ]; then
            echo "Lifecycle smoke (place_bet -> settle -> claim) skipped. Enable it via the run_lifecycle_smoke input."
            echo "bet=skipped" >> "$GITHUB_OUTPUT"
            echo "settle=skipped" >> "$GITHUB_OUTPUT"
            echo "claim=skipped" >> "$GITHUB_OUTPUT"
            echo "passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BETTOR=$(stellar keys address bettor)
          echo "Bettor address: $BETTOR"

          # place_bet — the bettor stakes on outcome 0 before the pool expires.
          # The optional referrer argument is omitted (defaults to None).
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source bettor \
            -- place_bet \
            --user "$BETTOR" \
            --pool_id "$POOL_ID" \
            --outcome 0 \
            --amount 2000000
          echo "Placed bet of 2000000 stroops on outcome 0"
          echo "bet=true" >> "$GITHUB_OUTPUT"

          echo "Waiting 330s for pool $POOL_ID to expire before settling..."
          sleep 330

          # settle_pool — only the admin (the deployer) may settle.
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source deployer \
            -- settle_pool \
            --caller "$TREASURY" \
            --pool_id "$POOL_ID" \
            --winning_outcome 0
          echo "Settled pool $POOL_ID with winning outcome 0"
          echo "settle=true" >> "$GITHUB_OUTPUT"

          # claim_winnings — the winning bettor claims; payout must be positive.
          CLAIM=$(stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network mainnet \
            --source bettor \
            -- claim_winnings \
            --user "$BETTOR" \
            --pool_id "$POOL_ID")
          CLAIM=$(echo "$CLAIM" | tr -d '"')
          echo "Claimed winnings: $CLAIM stroops"
          echo "claim=$CLAIM" >> "$GITHUB_OUTPUT"
          if [ -z "$CLAIM" ] || [ "$CLAIM" -le 0 ]; then
            echo "::error::claim_winnings returned a non-positive payout ($CLAIM)"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "passed=true" >> "$GITHUB_OUTPUT"

  report:
    name: Report
    needs: [deploy, smoke]
    if: always() && github.repository == 'dimka90/predinex-stellar'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download deployment manifest
        uses: actions/download-artifact@v4
        with:
          name: deployment-manifest
          path: ./deployment
        continue-on-error: true

      - name: Locate associated PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha,
            });
            const merged = res.data.find((pr) => pr.merged_at);
            const target = merged ?? res.data[0];
            if (target) {
              core.setOutput('number', String(target.number));
              core.setOutput('url', target.html_url);
            } else {
              core.setOutput('number', '');
              core.setOutput('url', '');
            }

      - name: Compose deployment summary
        id: summary
        env:
          DEPLOY_OUTCOME: ${{ needs.deploy.result }}
          SMOKE_OUTCOME: ${{ needs.smoke.result }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          DEPLOY_TX: ${{ needs.deploy.outputs.deploy_tx }}
          INIT_TX: ${{ needs.deploy.outputs.init_tx }}
          CREATE_TX: ${{ needs.smoke.outputs.create_tx }}
          POOL_BEFORE: ${{ needs.smoke.outputs.pool_count_before }}
          POOL_AFTER: ${{ needs.smoke.outputs.pool_count_after }}
          POOL_ID: ${{ needs.smoke.outputs.pool_id }}
          BET_PLACED: ${{ needs.smoke.outputs.bet_placed }}
          SETTLED: ${{ needs.smoke.outputs.settled }}
          CLAIM_AMOUNT: ${{ needs.smoke.outputs.claim_amount }}
          GIT_TAG: ${{ github.event.inputs.git_tag }}
          REPORT_RUN_ID: ${{ github.run_id }}
          REPORT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$SMOKE_OUTCOME" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Success"
          elif [ "$DEPLOY_OUTCOME" = "success" ]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="Deployed, smoke failed"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Failed"
          fi
          echo "status_icon=$STATUS_ICON" >> "$GITHUB_OUTPUT"
          echo "status_text=$STATUS_TEXT" >> "$GITHUB_OUTPUT"

          {
            echo "$STATUS_ICON **Mainnet deploy: $STATUS_TEXT** — tag \`${GIT_TAG}\` commit \`${COMMIT:0:7}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Network | mainnet |"
            echo "| Git tag | \`${GIT_TAG:-—}\` |"
            echo "| Contract ID | \`${CONTRACT_ID:-—}\` |"
            echo "| Deploy tx | \`${DEPLOY_TX:-—}\` |"
            echo "| Initialize tx | \`${INIT_TX:-—}\` |"
            echo "| Smoke pool id | \`${POOL_ID:-${CREATE_TX:-—}}\` |"
            echo "| Pool count (before → after) | \`${POOL_BEFORE:-—} → ${POOL_AFTER:-—}\` |"
            echo "| place_bet | \`${BET_PLACED:-—}\` |"
            echo "| settle_pool | \`${SETTLED:-—}\` |"
            echo "| claim_winnings (stroops) | \`${CLAIM_AMOUNT:-—}\` |"
            echo "| Workflow run | [$REPORT_RUN_ID]($REPORT_RUN_URL) |"
            echo ""
            if [ "$SMOKE_OUTCOME" != "success" ]; then
              echo "> **Rollback:** the previous good contract ID can be retrieved from prior PR comments or the \`deployment-manifest\` artifact of a previous run. See \`docs/deployments/rollback.md\` for steps."
            fi
          } > summary.md

          {
            echo "## Mainnet deploy summary"
            echo ""
            cat summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on associated PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

      - name: Create GitHub Release
        if: needs.deploy.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ github.event.inputs.git_tag }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          SMOKE_OUTCOME: ${{ needs.smoke.result }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          SMOKE_NOTE=""
          if [ "$SMOKE_OUTCOME" != "success" ]; then
            SMOKE_NOTE=" (smoke tests failed — verify manually before directing traffic)"
          fi
          RELEASE_NOTES="Mainnet deployment of contract \`${CONTRACT_ID:-—}\`${SMOKE_NOTE}. Deployment artifact attached. See workflow run for full details."
          gh release create "$GIT_TAG" \
            --title "Mainnet release $GIT_TAG" \
            --notes "$RELEASE_NOTES" \
            ./deployment/deployment.json \
            --repo "$RELEASE_REPO" \
            2>/dev/null || \
          gh release upload "$GIT_TAG" \
            ./deployment/deployment.json \
            --repo "$RELEASE_REPO" \
            --clobber

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS_TEXT: ${{ steps.summary.outputs.status_text }}
          STATUS_ICON: ${{ steps.summary.outputs.status_icon }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          GIT_TAG: ${{ github.event.inputs.git_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n --arg text "$STATUS_ICON Mainnet deploy: $STATUS_TEXT — tag \`${GIT_TAG}\` contract \`${CONTRACT_ID:-—}\` (<$RUN_URL|run>)" '{text: $text}')" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS_TEXT: ${{ steps.summary.outputs.status_text }}
          STATUS_ICON: ${{ steps.summary.outputs.status_icon }}
          CONTRACT_ID: ${{ needs.deploy.outputs.contract_id }}
          GIT_TAG: ${{ github.event.inputs.git_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n --arg content "$STATUS_ICON Mainnet deploy: $STATUS_TEXT — tag \`${GIT_TAG}\` contract \`${CONTRACT_ID:-—}\` ($RUN_URL)" '{content: $content}')" \
            "$DISCORD_WEBHOOK_URL"
